<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลังภาพ Snapshot — วัดปึก</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --bg:#080e1a; --surface:#0d1625; --surface2:#131f33;
    --border:#1e3050; --border2:#243a5a;
    --text:#cdd9ee; --text-dim:#5a7499; --text-muted:#344d6e;
    --accent:#2ee8a5; --accent-dim:rgba(46,232,165,.12);
    --warn:#f5a623; --error:#ff5a5a; --info:#4da6ff;
    --radius:10px; --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans Thai',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}

  /* nav */
  .topnav{display:flex;align-items:center;gap:12px;padding:13px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
  .topnav a{color:var(--text-dim);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:5px}
  .topnav a:hover{color:var(--text)}
  .topnav .sep{color:var(--text-muted)}
  .topnav .cur{color:var(--accent);font-weight:600;font-size:13px}

  /* layout */
  .layout{display:flex;height:calc(100vh - 46px)}

  /* sidebar */
  .sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .sidebar-head{padding:16px;border-bottom:1px solid var(--border)}
  .sidebar-head h2{font-size:13px;font-weight:700;color:#e8f0ff;margin-bottom:10px}

  /* date picker */
  .date-nav{display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .date-nav button{background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;transition:all .15s}
  .date-nav button:hover{border-color:var(--accent);color:var(--accent)}
  .date-nav .date-label{flex:1;text-align:center;font-family:var(--mono);font-size:13px;color:#e8f0ff;font-weight:600}
  input[type=date]{font-family:var(--sans);font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:5px 8px;width:100%;outline:none}
  input[type=date]:focus{border-color:rgba(46,232,165,.5)}

  /* cam list */
  .cam-list{flex:1;overflow-y:auto;padding:8px}
  .cam-list::-webkit-scrollbar{width:4px}
  .cam-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  .cam-item{border-radius:8px;margin-bottom:4px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
  .cam-item:hover{border-color:var(--border2)}
  .cam-item.active{border-color:rgba(46,232,165,.4);background:var(--accent-dim)}
  .cam-item-head{display:flex;align-items:center;gap:8px;padding:9px 12px}
  .cam-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
  .cam-item.active .cam-dot{background:var(--accent);box-shadow:0 0 5px var(--accent)}
  .cam-label{font-size:13px;font-weight:600;color:#e8f0ff}
  .cam-zone{font-size:11px;color:var(--text-dim)}
  .cam-count{margin-left:auto;font-size:10px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--border2);padding:2px 7px;border-radius:5px;color:var(--text-muted)}
  .cam-item.active .cam-count{background:var(--accent-dim);color:var(--accent);border-color:rgba(46,232,165,.3)}

  /* hour strip inside cam item */
  .hour-strip{padding:0 10px 10px;display:flex;flex-wrap:wrap;gap:4px}
  .hour-pill{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-muted);cursor:pointer;transition:all .15s}
  .hour-pill:hover{border-color:var(--info);color:var(--info)}
  .hour-pill.active{background:rgba(77,166,255,.15);border-color:var(--info);color:var(--info);font-weight:600}
  .hour-pill.has-snap{color:var(--text-dim)}

  /* main */
  .main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .main::-webkit-scrollbar{width:5px}
  .main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

  /* toolbar */
  .main-toolbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:10}
  .main-toolbar h3{font-size:14px;font-weight:700;color:#e8f0ff}
  .main-toolbar .meta{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
  .btn-sm{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);font-family:var(--sans);font-size:12px;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-sm:hover{border-color:var(--text-dim);color:var(--text)}
  .btn-accent{background:var(--accent-dim);border-color:rgba(46,232,165,.3);color:var(--accent)}
  .btn-accent:hover{background:rgba(46,232,165,.2)}

  /* grid */
  .snap-grid{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .snap-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s}
  .snap-card:hover{border-color:rgba(46,232,165,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .snap-card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:#050b15}
  .snap-card-info{padding:8px 10px;display:flex;align-items:center;justify-content:space-between}
  .snap-time{font-family:var(--mono);font-size:12px;font-weight:600;color:#e8f0ff}
  .snap-min{font-size:10px;color:var(--text-muted);font-family:var(--mono)}
  .snap-card.failed img{opacity:.15}

  /* empty */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:60px 20px;color:var(--text-muted);gap:12px;font-size:13px}
  .empty-state svg{opacity:.2}

  /* loading */
  .loading-state{display:flex;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--text-muted);font-size:13px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .lightbox.open{display:flex}
  .lb-img{max-width:90vw;max-height:72vh;border-radius:10px;border:1px solid var(--border2);object-fit:contain}
  .lb-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
  .lb-close{position:fixed;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:14px;z-index:1000}
  .lb-nav-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:18px;line-height:1;transition:all .15s}
  .lb-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .lb-nav-btn:disabled{opacity:.3;cursor:not-allowed}
  .lb-info{font-size:12px;color:var(--text-dim);font-family:var(--mono);text-align:center}

  /* strip */
  .lb-strip{display:flex;gap:5px;overflow-x:auto;max-width:90vw;padding:2px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
  .lb-strip::-webkit-scrollbar{height:3px}
  .lb-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  .lb-thumb{width:60px;height:38px;object-fit:cover;border-radius:4px;border:2px solid transparent;cursor:pointer;opacity:.5;flex-shrink:0;transition:all .15s}
  .lb-thumb.active{border-color:var(--accent);opacity:1}
  .lb-thumb:hover{opacity:.8}
  .lb-thumb.err{display:none}

  @media(max-width:640px){
    .layout{flex-direction:column;height:auto}
    .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border)}
    .snap-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/ocr-test.html" style="margin-left:auto">🔬 ทดสอบ OCR</a>
  <a href="/readings-admin.html">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    ประวัติระดับน้ำ
  </a>
  <span class="sep">›</span>
  <span class="cur">คลังภาพ Snapshot</span>
</nav>

<div class="layout">

  <!-- sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>เลือกวันที่และกล้อง</h2>
      <div class="date-nav">
        <button onclick="shiftDate(-1)">‹</button>
        <span class="date-label" id="date-label">—</span>
        <button onclick="shiftDate(1)">›</button>
      </div>
      <input type="date" id="date-picker" onchange="onDateChange()">
    </div>
    <div class="cam-list" id="cam-list">
      <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">กำลังโหลด…</div>
    </div>
  </div>

  <!-- main -->
  <div class="main" id="main">
    <div class="main-toolbar" id="main-toolbar" style="display:none">
      <h3 id="toolbar-title">—</h3>
      <span class="meta" id="toolbar-meta"></span>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn-sm" onclick="toggleView()" id="btn-view">☰ ชั่วโมง</button>
        <button class="btn-sm btn-accent" onclick="openAllHour()" id="btn-all" style="display:none">▶ ดูทั้งชั่วโมง</button>
      </div>
    </div>
    <div id="main-content" style="flex:1;display:flex;flex-direction:column">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        เลือกวันที่และกล้องจากแถบด้านซ้าย
      </div>
    </div>
  </div>

</div>

<!-- lightbox -->
<div class="lightbox" id="lightbox" onclick="lbClose()">
  <button class="lb-close" onclick="event.stopPropagation();lbClose()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="" onclick="event.stopPropagation()">
  <div class="lb-bar" onclick="event.stopPropagation()">
    <button class="lb-nav-btn" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <div>
      <div class="lb-info" id="lb-info"></div>
    </div>
    <button class="lb-nav-btn" id="lb-next" onclick="lbNav(1)">›</button>
  </div>
  <div class="lb-strip" id="lb-strip" onclick="event.stopPropagation()"></div>
</div>

<script>
const pad = n => String(n).padStart(2,'0');
const MINUTES = [0,5,10,15,20,25,30,35,40,45,50,55];
const HOURS = Array.from({length:24},(_,i)=>i);

let cams = [];
let selectedDate = ''; // YYYY-MM-DD
let selectedCam = null;
let selectedHour = null; // null = all hours view
let viewMode = 'hour'; // 'hour' | 'minute'

// snap grid data
let gridItems = []; // [{url, hour, minute, label}]
let lbIdx = 0;

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  // set today
  const now = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Bangkok'}));
  selectedDate = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('date-picker').value = selectedDate;
  updateDateLabel();

  // load cams
  try {
    const r = await fetch('/api/config');
    if(r.ok) { const cfg = await r.json(); cams = cfg.scanCams || []; }
  } catch {}
  if(!cams.length) cams = [
    {camId:'cam2',camLabel:'CAM 2',zoneName:'บ้านน้ำขุ่น'},
    {camId:'cam4',camLabel:'CAM 4',zoneName:'วัดกะทิง'},
    {camId:'cam6',camLabel:'CAM 6',zoneName:'วัดปึก'},
    {camId:'cam8',camLabel:'CAM 8',zoneName:'บ้านแตงเม'},
  ];

  await renderSidebar();
  // เลือกกล้องแรก
  if(cams.length) selectCam(cams[0]);
}

// ─── Date ────────────────────────────────────────────────────────────────────
function updateDateLabel() {
  const d = new Date(selectedDate + 'T00:00:00');
  const days = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  document.getElementById('date-label').textContent = `${days[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
}

function shiftDate(dir) {
  const d = new Date(selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + dir);
  selectedDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  document.getElementById('date-picker').value = selectedDate;
  updateDateLabel();
  renderSidebar();
  if(selectedCam) selectCam(selectedCam);
}

function onDateChange() {
  selectedDate = document.getElementById('date-picker').value;
  updateDateLabel();
  renderSidebar();
  if(selectedCam) selectCam(selectedCam);
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
async function renderSidebar() {
  const list = document.getElementById('cam-list');
  list.innerHTML = cams.map(cam => `
    <div class="cam-item ${selectedCam?.camId===cam.camId?'active':''}" id="cam-item-${cam.camId}" onclick="selectCam(${JSON.stringify(cam).replace(/"/g,'&quot;')})">
      <div class="cam-item-head">
        <div class="cam-dot"></div>
        <div>
          <div class="cam-label">${cam.camLabel}</div>
          <div class="cam-zone">${cam.zoneName}</div>
        </div>
        <span class="cam-count" id="count-${cam.camId}">—</span>
      </div>
    </div>`).join('');

  // นับภาพแต่ละกล้องแบบ async
  for(const cam of cams) {
    countSnaps(cam).then(n => {
      const el = document.getElementById(`count-${cam.camId}`);
      if(el) el.textContent = n > 0 ? `${n} ภาพ` : '—';
    });
  }
}

async function countSnaps(cam) {
  let count = 0;
  for(const h of HOURS) {
    const url = `/api/snapshot-file/${selectedDate}/${pad(h)}-00/${cam.camId}.jpg`;
    try {
      const r = await fetch(url, {method:'HEAD'});
      if(r.ok) count++;
    } catch {}
  }
  return count;
}

// ─── Select cam ──────────────────────────────────────────────────────────────
function selectCam(cam) {
  selectedCam = cam;
  selectedHour = null;
  viewMode = 'hour';
  document.querySelectorAll('.cam-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`cam-item-${cam.camId}`);
  if(el) el.classList.add('active');
  showAllHours();
}

// ─── All hours view ───────────────────────────────────────────────────────────
async function showAllHours() {
  const toolbar = document.getElementById('main-toolbar');
  const content = document.getElementById('main-content');
  toolbar.style.display = 'flex';
  document.getElementById('toolbar-title').textContent = `${selectedCam.camLabel} · ${selectedDate}`;
  document.getElementById('toolbar-meta').textContent = 'กำลังโหลด…';
  document.getElementById('btn-all').style.display = 'none';
  document.getElementById('btn-view').textContent = '☰ ชั่วโมง';

  content.innerHTML = `<div class="loading-state"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="30 60"/></svg>กำลังโหลดภาพ…</div>`;

  // หาภาพทุกชั่วโมง (นาที 00 ก่อน ถ้าไม่มีลอง 05, 10, ...)
  gridItems = [];
  const promises = HOURS.map(async h => {
    for(const m of MINUTES) {
      const url = `/api/snapshot-file/${selectedDate}/${pad(h)}-${pad(m)}/${selectedCam.camId}.jpg`;
      try {
        const r = await fetch(url, {method:'HEAD'});
        if(r.ok) { gridItems.push({url, hour:h, minute:m, label:`${pad(h)}:${pad(m)}`}); return; }
      } catch {}
    }
  });
  await Promise.all(promises);
  gridItems.sort((a,b) => a.hour!==b.hour ? a.hour-b.hour : a.minute-b.minute);

  document.getElementById('toolbar-meta').textContent = `${gridItems.length} ชั่วโมง`;

  if(!gridItems.length) {
    content.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>ไม่มีภาพสำหรับวันนี้</div>`;
    return;
  }

  content.innerHTML = `<div class="snap-grid">${gridItems.map((item,i) => `
    <div class="snap-card" onclick="openLightbox(${i})">
      <img src="${item.url}" alt="${item.label}" loading="lazy" onerror="this.closest('.snap-card').style.display='none'">
      <div class="snap-card-info">
        <span class="snap-time">${pad(item.hour)}:00</span>
        <span class="snap-min">นาที ${pad(item.minute)}</span>
      </div>
    </div>`).join('')}</div>`;
}

// ─── Hour detail view (ทุกนาทีของชั่วโมงนั้น) ────────────────────────────────
async function showHourDetail(hour) {
  selectedHour = hour;
  viewMode = 'minute';
  document.getElementById('toolbar-title').textContent = `${selectedCam.camLabel} · ${selectedDate} · ${pad(hour)}:00`;
  document.getElementById('toolbar-meta').textContent = 'กำลังโหลด…';
  document.getElementById('btn-all').style.display = '';
  document.getElementById('btn-view').textContent = '← ทุกชั่วโมง';

  const content = document.getElementById('main-content');
  content.innerHTML = `<div class="loading-state"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="30 60"/></svg>กำลังโหลด…</div>`;

  gridItems = [];
  const promises = MINUTES.map(async m => {
    const url = `/api/snapshot-file/${selectedDate}/${pad(hour)}-${pad(m)}/${selectedCam.camId}.jpg`;
    try {
      const r = await fetch(url, {method:'HEAD'});
      if(r.ok) gridItems.push({url, hour, minute:m, label:`${pad(hour)}:${pad(m)}`});
    } catch {}
  });
  await Promise.all(promises);
  gridItems.sort((a,b) => a.minute-b.minute);

  document.getElementById('toolbar-meta').textContent = `${gridItems.length} ภาพ`;

  if(!gridItems.length) {
    content.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>ไม่มีภาพใน ${pad(hour)}:00</div>`;
    return;
  }

  content.innerHTML = `<div class="snap-grid">${gridItems.map((item,i) => `
    <div class="snap-card" onclick="openLightbox(${i})">
      <img src="${item.url}" alt="${item.label}" loading="lazy" onerror="this.closest('.snap-card').style.display='none'">
      <div class="snap-card-info">
        <span class="snap-time">${item.label}</span>
      </div>
    </div>`).join('')}</div>`;
}

function toggleView() {
  if(viewMode === 'minute') { selectedHour = null; viewMode = 'hour'; showAllHours(); }
}

function openAllHour() { showAllHours(); }

// ─── Lightbox ─────────────────────────────────────────────────────────────────
function openLightbox(idx) {
  lbIdx = idx;
  const strip = document.getElementById('lb-strip');
  strip.innerHTML = gridItems.map((item,i) => `
    <img class="lb-thumb ${i===idx?'active':''}" src="${item.url}" alt="${item.label}"
      onclick="lbGoTo(${i})" onerror="this.classList.add('err')">`).join('');
  document.getElementById('lightbox').classList.add('open');
  lbRender();
}

function lbRender() {
  const item = gridItems[lbIdx];
  if(!item) return;
  document.getElementById('lb-img').src = item.url;
  document.getElementById('lb-info').textContent = `${selectedCam?.camLabel} · ${selectedDate} · ${item.label} (${lbIdx+1}/${gridItems.length})`;
  document.getElementById('lb-prev').disabled = lbIdx === 0;
  document.getElementById('lb-next').disabled = lbIdx === gridItems.length-1;
  document.querySelectorAll('.lb-thumb').forEach((t,i) => {
    t.classList.toggle('active', i===lbIdx);
    if(i===lbIdx) t.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  });
}

function lbGoTo(i) { lbIdx = Math.max(0, Math.min(i, gridItems.length-1)); lbRender(); }
function lbNav(dir) { lbGoTo(lbIdx + dir); }
function lbClose() { document.getElementById('lightbox').classList.remove('open'); }

document.addEventListener('keydown', e => {
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='ArrowLeft') lbNav(-1);
  else if(e.key==='ArrowRight') lbNav(1);
  else if(e.key==='Escape') lbClose();
});

// กดชั่วโมงในกริดไปดูรายนาที
document.getElementById('main-content').addEventListener('click', e => {
  const card = e.target.closest('.snap-card');
  if(!card || viewMode==='minute') return;
  // หา hour จาก snap-time
  const timeEl = card.querySelector('.snap-time');
  if(timeEl) {
    const h = parseInt(timeEl.textContent);
    if(!isNaN(h)) showHourDetail(h);
  }
});

init();
</script>
</body>
</html>
