<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ทดสอบ OCR — วัดปึก</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --bg:#080e1a;--surface:#0d1625;--surface2:#131f33;
    --border:#1e3050;--border2:#243a5a;
    --text:#cdd9ee;--text-dim:#5a7499;--text-muted:#344d6e;
    --accent:#2ee8a5;--accent-dim:rgba(46,232,165,.12);
    --warn:#f5a623;--error:#ff5a5a;--info:#4da6ff;
    --radius:10px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans Thai',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}

  .topnav{display:flex;align-items:center;gap:12px;padding:13px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
  .topnav a{color:var(--text-dim);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:5px}
  .topnav a:hover{color:var(--text)}
  .topnav .sep{color:var(--text-muted)}
  .topnav .cur{color:var(--accent);font-weight:600;font-size:13px}

  .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 46px)}

  /* left panel */
  .left{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .panel-head{padding:14px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);display:flex;align-items:center;gap:8px}
  .panel-head .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 5px var(--accent)}

  /* image preview */
  .img-preview{flex-shrink:0;padding:12px 16px;border-bottom:1px solid var(--border)}
  .img-box{width:100%;aspect-ratio:16/10;background:#050b15;border:1px solid var(--border2);border-radius:8px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
  .img-box img{width:100%;height:100%;object-fit:contain}
  .img-box .placeholder{color:var(--text-muted);font-size:12px;text-align:center;padding:16px}
  .img-label{font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:6px;text-align:center}

  /* source tabs */
  .source-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .tab{flex:1;padding:10px 8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* upload zone */
  .upload-zone{padding:12px 16px;border-bottom:1px solid var(--border)}
  .drop-area{border:1.5px dashed var(--border2);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;color:var(--text-muted)}
  .drop-area:hover,.drop-area.drag{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .drop-area input{display:none}

  /* snap picker */
  .snap-picker{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:8px}
  .snap-picker::-webkit-scrollbar{width:4px}
  .snap-picker::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
  select,input[type=date],input[type=number]{font-family:var(--sans);font-size:13px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:7px 10px;appearance:none;outline:none;width:100%;transition:border-color .15s}
  select:focus,input:focus{border-color:rgba(46,232,165,.5)}
  .sel-wrap{position:relative}
  .sel-wrap::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:11px}

  /* snap thumb grid */
  .thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:4px}
  .thumb-item{aspect-ratio:4/3;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#050b15;position:relative}
  .thumb-item:hover{border-color:var(--border2)}
  .thumb-item.active{border-color:var(--accent)}
  .thumb-item img{width:100%;height:100%;object-fit:cover}
  .thumb-item .t-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-family:var(--mono);font-size:9px;color:#e8f0ff;padding:2px 4px;text-align:center}
  .thumb-loading{grid-column:1/-1;text-align:center;color:var(--text-muted);font-size:12px;padding:16px}

  /* run button */
  .run-area{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
  .btn-run{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);color:#052a1a;font-family:var(--sans);font-size:14px;font-weight:700;padding:11px;border:none;border-radius:var(--radius);cursor:pointer;transition:all .15s}
  .btn-run:hover{background:#48ffbc}
  .btn-run:disabled{background:var(--surface2);color:var(--text-muted);cursor:not-allowed}

  /* right panel */
  .right{display:flex;flex-direction:column;overflow:hidden}

  /* result header */
  .result-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
  .result-head h2{font-size:15px;font-weight:700;color:#e8f0ff}
  .badge-result{font-size:13px;font-family:var(--mono);font-weight:700;padding:4px 12px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-muted)}
  .badge-result.ok{background:rgba(46,232,165,.15);border-color:rgba(46,232,165,.35);color:var(--accent)}
  .badge-result.fail{background:rgba(255,90,90,.1);border-color:rgba(255,90,90,.2);color:var(--error)}

  /* result body */
  .result-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
  .result-body::-webkit-scrollbar{width:4px}
  .result-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

  /* info cards */
  .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .info-card .val{font-size:22px;font-weight:700;font-family:var(--mono);color:#e8f0ff}
  .info-card .val.accent{color:var(--accent)}
  .info-card .val.error{color:var(--error)}
  .info-card .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:2px}

  /* detected markings */
  .markings-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
  .markings-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:10px}
  .markings-list{display:flex;flex-wrap:wrap;gap:6px}
  .marking-tag{font-family:var(--mono);font-size:14px;font-weight:600;padding:5px 12px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim)}
  .marking-tag.selected{background:var(--accent-dim);border-color:rgba(46,232,165,.4);color:var(--accent)}

  /* explanation */
  .expl-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
  .expl-box .expl-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:8px}
  .expl-box .expl-text{font-size:13px;color:var(--text);line-height:1.65}

  /* log */
  .log-box{background:#050b15;border:1px solid var(--border);border-radius:10px;padding:14px;font-family:var(--mono);font-size:12px;line-height:1.8}
  .log-box .log-head{font-family:var(--sans);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);margin-bottom:8px}
  .log-line{display:flex;gap:8px}
  .log-time{color:var(--text-muted);flex-shrink:0}
  .log-line.info .log-msg{color:#7daef5}
  .log-line.success .log-msg{color:var(--accent)}
  .log-line.error .log-msg{color:var(--error)}
  .log-line.warn .log-msg{color:var(--warn)}
  .log-line.dim .log-msg{color:var(--text-muted)}

  /* empty */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--text-muted);font-size:13px}
  .empty svg{opacity:.2}

  /* spinner */
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#052a1a;border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  @media(max-width:700px){
    .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .left{height:auto;max-height:50vh}
    .info-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/readings-admin.html">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    ประวัติ
  </a>
  <span class="sep">›</span>
  <a href="/snapshots.html">คลังภาพ</a>
  <span class="sep">›</span>
  <span class="cur">ทดสอบ OCR</span>
</nav>

<div class="layout">

<!-- ─── LEFT ──────────────────────────────────────────────── -->
<div class="left">
  <div class="panel-head"><div class="dot"></div>เลือกภาพ</div>

  <!-- preview -->
  <div class="img-preview">
    <div class="img-box" id="img-box">
      <div class="placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:.3;margin:0 auto 8px;display:block"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        เลือกภาพเพื่อทดสอบ
      </div>
    </div>
    <div class="img-label" id="img-label">—</div>
  </div>

  <!-- tabs -->
  <div class="source-tabs">
    <div class="tab active" onclick="switchTab('snap')" id="tab-snap">📷 จากคลัง</div>
    <div class="tab" onclick="switchTab('upload')" id="tab-upload">⬆ อัปโหลด</div>
  </div>

  <!-- snap picker -->
  <div id="pane-snap" class="snap-picker">
    <div class="field">
      <label>วันที่</label>
      <input type="date" id="snap-date" onchange="loadSnapGrid()">
    </div>
    <div class="field">
      <label>กล้อง</label>
      <div class="sel-wrap">
        <select id="snap-cam" onchange="loadSnapGrid()">
          <option value="">— เลือกกล้อง —</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>ชั่วโมง</label>
      <div class="sel-wrap">
        <select id="snap-hour" onchange="loadSnapGrid()">
          <option value="">ทุกชั่วโมง</option>
        </select>
      </div>
    </div>
    <div class="thumb-grid" id="thumb-grid">
      <div class="thumb-loading">เลือกวันที่และกล้องก่อน</div>
    </div>
  </div>

  <!-- upload pane -->
  <div id="pane-upload" style="display:none;flex:1;padding:12px 16px">
    <label class="drop-area" id="drop-area">
      <input type="file" accept="image/*" id="file-input" onchange="onFileChange(event)">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 8px;display:block"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      คลิกหรือลากไฟล์ภาพมาวาง<br>
      <span style="font-size:11px;margin-top:4px;display:block">(JPG, PNG, WEBP)</span>
    </label>
  </div>

  <!-- run -->
  <div class="run-area">
    <button class="btn-run" id="btn-run" onclick="runOCR()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      อ่านภาพนี้
    </button>
  </div>
</div>

<!-- ─── RIGHT ─────────────────────────────────────────────── -->
<div class="right">
  <div class="result-head">
    <h2>ผลการอ่าน</h2>
    <span class="badge-result" id="badge-result">รอภาพ</span>
    <span style="margin-left:auto;font-size:12px;color:var(--text-muted)" id="elapsed"></span>
  </div>
  <div class="result-body" id="result-body">
    <div class="empty" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      เลือกภาพแล้วกด "อ่านภาพนี้"<br>ผลจะแสดงที่นี่ — ไม่มีการบันทึก
    </div>
  </div>
</div>

</div>

<script>
const pad = n => String(n).padStart(2,'0');
const MINUTES = [0,5,10,15,20,25,30,35,40,45,50,55];
const HOURS = Array.from({length:24},(_,i)=>i);

let cams = [];
let selectedUrl = null;
let selectedFile = null;
let currentTab = 'snap';

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // today
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Bangkok'}));
  document.getElementById('snap-date').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  // hours dropdown
  const hSel = document.getElementById('snap-hour');
  HOURS.forEach(h => { const o = document.createElement('option'); o.value = h; o.textContent = `${pad(h)}:00`; hSel.appendChild(o); });

  // load cams
  try {
    const r = await fetch('/api/config');
    if(r.ok){ const cfg = await r.json(); cams = cfg.scanCams || []; }
  } catch {}
  if(!cams.length) cams = [
    {camId:'cam2',camLabel:'CAM 2',zoneName:'บ้านน้ำขุ่น'},
    {camId:'cam4',camLabel:'CAM 4',zoneName:'วัดกะทิง'},
    {camId:'cam6',camLabel:'CAM 6',zoneName:'วัดปึก'},
    {camId:'cam8',camLabel:'CAM 8',zoneName:'บ้านแตงเม'},
  ];

  const camSel = document.getElementById('snap-cam');
  cams.forEach(c => { const o = document.createElement('option'); o.value = c.camId; o.textContent = `${c.camLabel} · ${c.zoneName}`; camSel.appendChild(o); });
  if(cams.length) { camSel.value = cams[0].camId; loadSnapGrid(); }

  // drag drop
  const drop = document.getElementById('drop-area');
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('drag'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
}

// ─── Tab ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-snap').classList.toggle('active', tab==='snap');
  document.getElementById('tab-upload').classList.toggle('active', tab==='upload');
  document.getElementById('pane-snap').style.display = tab==='snap' ? 'flex' : 'none';
  document.getElementById('pane-snap').style.flexDirection = 'column';
  document.getElementById('pane-upload').style.display = tab==='upload' ? 'block' : 'none';
  if(tab==='snap') loadSnapGrid();
}

// ─── Snap grid ───────────────────────────────────────────────────────────────
async function loadSnapGrid() {
  const date = document.getElementById('snap-date').value;
  const camId = document.getElementById('snap-cam').value;
  const hour = document.getElementById('snap-hour').value;
  const grid = document.getElementById('thumb-grid');
  if(!date || !camId) { grid.innerHTML = '<div class="thumb-loading">เลือกวันที่และกล้องก่อน</div>'; return; }

  grid.innerHTML = '<div class="thumb-loading">กำลังโหลด…</div>';

  const hours = hour !== '' ? [parseInt(hour)] : HOURS;
  const found = [];

  await Promise.all(hours.map(async h => {
    for(const m of MINUTES) {
      const url = `/api/snapshot-file/${date}/${pad(h)}-${pad(m)}/${camId}.jpg`;
      try {
        const r = await fetch(url, {method:'HEAD'});
        if(r.ok) { found.push({url, h, m}); return; }
      } catch {}
    }
  }));

  found.sort((a,b) => a.h!==b.h ? a.h-b.h : a.m-b.m);

  if(!found.length) {
    grid.innerHTML = '<div class="thumb-loading">ไม่มีภาพ</div>';
    return;
  }

  grid.innerHTML = found.map(item => `
    <div class="thumb-item" onclick="selectSnap('${item.url}','${date} ${pad(item.h)}:${pad(item.m)}')" data-url="${item.url}">
      <img src="${item.url}" alt="${pad(item.h)}:${pad(item.m)}" loading="lazy" onerror="this.closest('.thumb-item').style.display='none'">
      <div class="t-label">${pad(item.h)}:${pad(item.m)}</div>
    </div>`).join('');
}

function selectSnap(url, label) {
  selectedUrl = url; selectedFile = null;
  document.querySelectorAll('.thumb-item').forEach(el => el.classList.toggle('active', el.dataset.url===url));
  setPreview(url, label);
}

// ─── Upload ───────────────────────────────────────────────────────────────────
function onFileChange(e) { if(e.target.files[0]) handleFile(e.target.files[0]); }
function handleFile(file) {
  selectedFile = file; selectedUrl = null;
  const url = URL.createObjectURL(file);
  setPreview(url, file.name);
}

function setPreview(url, label) {
  document.getElementById('img-box').innerHTML = `<img src="${url}" alt="preview">`;
  document.getElementById('img-label').textContent = label;
  document.getElementById('btn-run').disabled = false;
}

// ─── OCR ──────────────────────────────────────────────────────────────────────
function nowStr() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function addLog(type, msg) {
  const box = document.getElementById('log-box');
  if(!box) return;
  const line = document.createElement('div');
  line.className = 'log-line ' + (type||'dim');
  const prefix = type==='success'?'✓':type==='error'?'✗':type==='warn'?'!':'·';
  line.innerHTML = `<span class="log-time">[${nowStr()}]</span><span class="log-msg">${prefix} ${esc(msg)}</span>`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function runOCR() {
  if(!selectedUrl && !selectedFile) return;
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> กำลังอ่าน…';

  const badge = document.getElementById('badge-result');
  badge.className = 'badge-result';
  badge.textContent = 'กำลังอ่าน…';
  document.getElementById('elapsed').textContent = '';

  // สร้าง result UI
  document.getElementById('result-body').innerHTML = `
    <div class="info-grid">
      <div class="info-card"><div class="val" id="r-level">—</div><div class="lbl">ระดับน้ำ (ม.)</div></div>
      <div class="info-card"><div class="val" id="r-conf">—</div><div class="lbl">ความมั่นใจ</div></div>
      <div class="info-card"><div class="val" id="r-status">—</div><div class="lbl">สถานะ</div></div>
    </div>
    <div class="markings-wrap">
      <div class="markings-head">ตัวเลขที่อ่านได้ทั้งหมด (detectedMarkings)</div>
      <div class="markings-list" id="r-markings"><span style="color:var(--text-muted);font-size:12px">รอผล…</span></div>
    </div>
    <div class="expl-box">
      <div class="expl-head">คำอธิบาย AI</div>
      <div class="expl-text" id="r-expl">รอผล…</div>
    </div>
    <div class="log-box">
      <div class="log-head">Log</div>
      <div id="log-box"></div>
    </div>`;

  addLog('info', 'เริ่มส่งภาพไปอ่าน…');
  const t0 = Date.now();

  try {
    let base64, mimeType = 'image/jpeg';

    if(selectedFile) {
      addLog('info', `ไฟล์: ${selectedFile.name} (${(selectedFile.size/1024).toFixed(0)} KB)`);
      mimeType = selectedFile.type || 'image/jpeg';
      base64 = await new Promise((res,rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(selectedFile);
      });
    } else {
      addLog('info', `URL: ${selectedUrl}`);
      const imgRes = await fetch(selectedUrl);
      if(!imgRes.ok) throw new Error(`ดึงภาพไม่ได้ HTTP ${imgRes.status}`);
      mimeType = imgRes.headers.get('content-type') || 'image/jpeg';
      const buf = await imgRes.arrayBuffer();
      base64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
      addLog('info', `ขนาดภาพ: ${(buf.byteLength/1024).toFixed(0)} KB, type: ${mimeType}`);
    }

    addLog('info', 'ส่งไป /api/ocr-water-level…');
    const res = await fetch('/api/ocr-water-level', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ imageBase64: base64, mimeType }),
    });

    const elapsed = ((Date.now()-t0)/1000).toFixed(1);
    document.getElementById('elapsed').textContent = `${elapsed}s`;

    if(!res.ok) throw new Error(`Server ${res.status}: ${await res.text()}`);
    const data = await res.json();
    addLog('info', `ได้ผลแล้ว (${elapsed}s)`);

    // แสดงผล
    const level = data.waterLevel;
    const conf = data.confidence;
    const status = data.readStatus || '—';
    const expl = data.explanation || '—';
    const markings = data.detectedMarkings || [];

    document.getElementById('r-level').textContent = level != null ? level.toFixed(2) : 'null';
    document.getElementById('r-level').className = 'val ' + (level != null ? 'accent' : 'error');
    document.getElementById('r-conf').textContent = conf != null ? `${(conf*100).toFixed(0)}%` : '—';
    document.getElementById('r-status').textContent = status;
    document.getElementById('r-expl').textContent = expl;

    const mList = document.getElementById('r-markings');
    if(markings.length) {
      mList.innerHTML = markings.map(m => {
        const v = parseFloat(m);
        const isSelected = level != null && Math.abs(v - level) < 0.001;
        return `<span class="marking-tag ${isSelected?'selected':''}">${m}</span>`;
      }).join('');
    } else {
      mList.innerHTML = '<span style="color:var(--text-muted);font-size:12px">ไม่พบตัวเลข</span>';
    }

    // log raw JSON
    addLog('dim', `gaugeFound: ${data.gaugeFound}`);
    addLog('dim', `waterLevel: ${data.waterLevel}`);
    addLog('dim', `confidence: ${data.confidence}`);
    addLog('dim', `detectedMarkings: [${markings.join(', ')}]`);
    addLog('dim', `aiProvider: ${data.aiProvider || '—'}, aiModel: ${data.aiModel || '—'}`);

    if(level != null) {
      addLog('success', `อ่านได้ ${level.toFixed(2)} ม. (${status})`);
      badge.className = 'badge-result ok';
      badge.textContent = `✅ ${level.toFixed(2)} ม.`;
    } else {
      addLog('warn', 'อ่านไม่ได้ — waterLevel: null');
      badge.className = 'badge-result fail';
      badge.textContent = '❌ อ่านไม่ได้';
    }

  } catch(e) {
    const elapsed = ((Date.now()-t0)/1000).toFixed(1);
    document.getElementById('elapsed').textContent = `${elapsed}s`;
    addLog('error', 'เกิดข้อผิดพลาด: ' + e.message);
    badge.className = 'badge-result fail';
    badge.textContent = '❌ Error';
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> อ่านอีกครั้ง';
}

init();
</script>
</body>
</html>
